        async function verificarServidor() {
            const ip = "jogar.playnew.site:28254"; // Altere para o IP do seu servidor
            const url = `https://api.mcsrvstat.us/2/${ip}`;

            try {
                const resposta = await fetch(url);
                const dados = await resposta.json();

                // Verifica se o servidor está online
                if (dados.online) {
                    document.getElementById("status").innerHTML =</i> " Servidor ONLINE";
                    document.getElementById("players").innerHTML = `${dados.players.online}/${dados.players.max}`;
                    
                    // Obtém o MOTD formatado corretamente
                    const motd = dados.motd.clean.join(" "); // Converte array em texto
                    document.getElementById("motd").innerHTML = motd;
                } else {
                    document.getElementById("status").innerHTML = "❌ Servidor OFFLINE";
                    document.getElementById("players").innerHTML = "--";
                    document.getElementById("motd").innerHTML = "--";
                }
            } catch (error) {
                document.getElementById("status").innerHTML = "Erro ao obter informações";
                document.getElementById("players").innerHTML = "--";
                document.getElementById("motd").innerHTML = "--";
                console.error("Erro:", error);
            }
        }

        verificarServidor();
        setInterval(verificarServidor, 10000); // Atualiza a cada 10 segundos
    </script>

<script>
        let messages = [];
        let currentPage = 0;
        const messagesPerPage = 20;

        function postMessage() {
            const content = document.getElementById('messageContent').value;
            const media = document.getElementById('mediaUpload').files[0];
            const message = { content, media, comments: [], likes: 0 };
            messages.push(message);
            document.getElementById('messageContent').value = '';
            document.getElementById('mediaUpload').value = '';
            displayMessages();
        }

        function displayMessages() {
            const messageBoard = document.getElementById('messageBoard');
            messageBoard.innerHTML = '';
            const start = currentPage * messagesPerPage;
            const end = start + messagesPerPage;
            const currentMessages = messages.slice(start, end);

            currentMessages.forEach((message, index) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';

                const content = document.createElement('p');
                content.textContent = message.content;
                messageDiv.appendChild(content);

                if (message.media) {
                    const mediaElement = document.createElement('img'); // ou 'video', 'audio' conforme necessário
                    mediaElement.src = URL.createObjectURL(message.media);
                    mediaElement.controls = true;
                    messageDiv.appendChild(mediaElement);
                }

                const likes = document.createElement('button');
                likes.textContent = `Like (${message.likes})`;
                likes.onclick = () => { message.likes++; displayMessages(); };
                messageDiv.appendChild(likes);

                const commentSection = document.createElement('div');
                commentSection.className = 'comments';
                message.comments.forEach(comment => {
                    const commentDiv = document.createElement('div');
                    commentDiv.textContent = comment;
                    commentSection.appendChild(commentDiv);
                });

                const commentInput = document.createElement('textarea');
                commentInput.rows = 2;
                commentInput.cols = 40;
                commentInput.placeholder = 'Deixe um comentário...';
                commentSection.appendChild(commentInput);

                const postComment = document.createElement('button');
                postComment.textContent = 'Postar Comentário';
                postComment.onclick = () => {
                    message.comments.push(commentInput.value);
                    commentInput.value = '';
                    displayMessages();
                };
                commentSection.appendChild(postComment);

                messageDiv.appendChild(commentSection);
                messageBoard.appendChild(messageDiv);
            });
        }

        function nextPage() {
            if ((currentPage + 1) * messagesPerPage < messages.length) {
                currentPage++;
                displayMessages();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                displayMessages();
            }
        }

</script>
